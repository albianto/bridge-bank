<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Bridge Bank{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ ingress_entry }}/static/style.css">
  <script>
    // Inherit HA theme CSS variables from parent frame (same-origin via Ingress)
    (function() {
      if (window.parent === window) return;
      var vars = [
        'primary-background-color','card-background-color','primary-text-color',
        'secondary-text-color','divider-color','primary-color','accent-color',
        'error-color','warning-color','success-color','info-color',
        'disabled-text-color','input-fill-color','ha-font-family','ha-card-background'
      ];
      try {
        var ps = getComputedStyle(window.parent.document.documentElement);
        var root = document.documentElement;
        vars.forEach(function(v) {
          var val = ps.getPropertyValue('--' + v).trim();
          if (val) root.style.setProperty('--' + v, val);
        });
      } catch(e) { /* cross-origin or sandboxed */ }
    })();
  </script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <a class="logo" href="{{ ingress_entry }}/">
        <div class="logo-mark">&#x27F7;</div>
        <span class="logo-name">Bridge Bank</span>
      </a>
      <nav class="sidebar-nav">
        <a href="{{ ingress_entry }}/setup" {% if active == 'license' %}class="active"{% endif %}>
          <span class="nav-icon">&#x1F511;</span> License
        </a>
        <a href="{{ ingress_entry }}/setup/actual" {% if active == 'actual' %}class="active"{% endif %}>
          <span class="nav-icon">&#x1F4B0;</span> Actual Budget
        </a>
        <a href="{{ ingress_entry }}/setup/notifications" {% if active == 'notifications' %}class="active"{% endif %}>
          <span class="nav-icon">&#x2709;</span> Notifications
        </a>
        <a href="{{ ingress_entry }}/bank" {% if active == 'bank' %}class="active"{% endif %}>
          <span class="nav-icon">&#x1F3E6;</span> Bank
        </a>
        <a href="{{ ingress_entry }}/status" {% if active == 'status' %}class="active"{% endif %}>
          <span class="nav-icon">&#x2713;</span> Status
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="mailto:support@david-alves.com">Support</a>
        <a href="https://bridgebank.app/privacy" target="_blank" rel="noopener noreferrer">Privacy</a>
        <a href="https://bridgebank.app/terms" target="_blank" rel="noopener noreferrer">Terms</a>
        <a href="https://github.com/DAdjadj/bridge-bank" target="_blank" rel="noopener noreferrer">GitHub</a>
        <span class="sidebar-version">v{{ app_version }}</span>
      </div>
    </aside>
    <main class="main-content">
      <div class="wrap">
        {% block steps %}{% endblock %}
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>
  <!-- Mobile bottom nav (hidden on desktop) -->
  <nav class="footer-nav">
    <a href="{{ ingress_entry }}/setup" {% if active == 'license' %}class="active"{% endif %}>License</a>
    <a href="{{ ingress_entry }}/setup/actual" {% if active == 'actual' %}class="active"{% endif %}>Actual Budget</a>
    <a href="{{ ingress_entry }}/setup/notifications" {% if active == 'notifications' %}class="active"{% endif %}>Notifications</a>
    <a href="{{ ingress_entry }}/bank" {% if active == 'bank' %}class="active"{% endif %}>Bank</a>
    <a href="{{ ingress_entry }}/status" {% if active == 'status' %}class="active"{% endif %}>Status</a>
  </nav>
<script>
(function(){var tz=Intl.DateTimeFormat().resolvedOptions().timeZone;if(tz)fetch('{{ ingress_entry }}/api/timezone',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tz:tz})});})();
</script>
</body>
</html>
